<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMS Admin Portal - Login</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">
    <!-- Background Animated Elements -->
    <div class="background-decorations">
        <div class="floating-shape shape-1"></div>
        <div class="floating-shape shape-2"></div>
        <div class="floating-shape shape-3"></div>
    </div>

    <!-- Login Container -->
    <div class="login-wrapper">
        <!-- Glassmorphism Card -->
        <div class="login-card" style="position: relative;">
            <!-- API Settings Configuration -->
            <div class="api-settings-toggle" onclick="toggleApiSettings()" title="Configure Deployed Backend URL">
                <i class="fa-solid fa-gear"></i>
            </div>
            
            <div class="api-settings-panel" id="api-settings-panel">
                <label for="api-base-url-input"><i class="fa-solid fa-server"></i> API Backend URL</label>
                <div style="display: flex; gap: 8px; margin-top: 8px;">
                    <input type="url" id="api-base-url-input" placeholder="https://ems-backend.onrender.com" style="margin-bottom:0; font-size:12px; padding: 8px 12px; height: 36px;">
                    <button type="button" class="btn btn-primary" onclick="saveApiUrl()" style="padding: 8px 14px; border-radius: 8px; font-size:12px; height: 36px; display: flex; align-items: center; justify-content: center;"><i class="fa-solid fa-check"></i></button>
                </div>
                <span class="api-settings-note" style="display:block; font-size:10px; color:var(--text-secondary); margin-top:5px; line-height: 1.3;">Enter your Spring Boot Render URL to route HTTP calls.</span>
            </div>

            <div class="login-header">
                <div class="brand-logo">
                    <i class="fa-solid fa-people-roof"></i>
                </div>
                <h2>Employee Management System</h2>
                <p id="auth-subtitle">Sign in to access your administrative dashboard</p>
            </div>

            <!-- Toast Notification Container -->
            <div id="toast-container" class="toast-container"></div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form active">
                <div class="input-group">
                    <label for="login-username"><i class="fa-regular fa-user"></i> Username</label>
                    <input type="text" id="login-username" placeholder="Enter admin username" required autocomplete="username" value="admin">
                    <div class="input-underline"></div>
                </div>

                <div class="input-group">
                    <label for="login-password"><i class="fa-solid fa-lock"></i> Password</label>
                    <div class="password-field-wrapper">
                        <input type="password" id="login-password" placeholder="Enter security password" required autocomplete="current-password" value="password123">
                        <button type="button" class="toggle-password-btn" onclick="togglePasswordVisibility('login-password')">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                    <div class="input-underline"></div>
                </div>

                <button type="submit" class="auth-submit-btn" id="login-submit-btn">
                    <span class="btn-text">Sign In</span>
                    <span class="btn-loader"><i class="fa-solid fa-circle-notch fa-spin"></i></span>
                </button>

                <p class="auth-switch-text">
                    Need an admin account? 
                    <a href="#" id="switch-to-register">Register Here</a>
                </p>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="auth-form">
                <div class="input-group">
                    <label for="reg-username"><i class="fa-regular fa-user"></i> Username</label>
                    <input type="text" id="reg-username" placeholder="Create username (min 3 chars)" required autocomplete="username">
                    <div class="input-underline"></div>
                </div>

                <div class="input-group">
                    <label for="reg-email"><i class="fa-regular fa-envelope"></i> Email Address</label>
                    <input type="email" id="reg-email" placeholder="Enter admin email address" required autocomplete="email">
                    <div class="input-underline"></div>
                </div>

                <div class="input-group">
                    <label for="reg-password"><i class="fa-solid fa-lock"></i> Password</label>
                    <div class="password-field-wrapper">
                        <input type="password" id="reg-password" placeholder="Create password (min 6 chars)" required autocomplete="new-password">
                        <button type="button" class="toggle-password-btn" onclick="togglePasswordVisibility('reg-password')">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                    <div class="input-underline"></div>
                </div>

                <button type="submit" class="auth-submit-btn" id="register-submit-btn">
                    <span class="btn-text">Create Account</span>
                    <span class="btn-loader"><i class="fa-solid fa-circle-notch fa-spin"></i></span>
                </button>

                <p class="auth-switch-text">
                    Already have an account? 
                    <a href="#" id="switch-to-login">Sign In Here</a>
                </p>
            </form>
        </div>
    </div>

    <!-- Script for auth redirection & API communication -->
    <script src="js/app.js"></script>
    <script>
        // Inline code specific to Login page setup (to verify token and swap forms)
        document.addEventListener('DOMContentLoaded', () => {
            // Check if user is already logged in, redirect if so
            const token = localStorage.getItem('ems_session_token');
            if (token) {
                window.location.href = 'index.html';
                return;
            }

            // Load saved API URL on startup
            const savedApiUrl = localStorage.getItem('ems_api_base_url');
            if (savedApiUrl) {
                document.getElementById('api-base-url-input').value = savedApiUrl;
            }

            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const switchToRegister = document.getElementById('switch-to-register');
            const switchToLogin = document.getElementById('switch-to-login');
            const subtitle = document.getElementById('auth-subtitle');

            switchToRegister.addEventListener('click', (e) => {
                e.preventDefault();
                loginForm.classList.remove('active');
                setTimeout(() => {
                    registerForm.classList.add('active');
                    subtitle.textContent = "Register a new administrative account";
                }, 200);
            });

            switchToLogin.addEventListener('click', (e) => {
                e.preventDefault();
                registerForm.classList.remove('active');
                setTimeout(() => {
                    loginForm.classList.add('active');
                    subtitle.textContent = "Sign in to access your administrative dashboard";
                }, 200);
            });
        });

        function toggleApiSettings() {
            const panel = document.getElementById('api-settings-panel');
            panel.classList.toggle('active');
        }

        function saveApiUrl() {
            const input = document.getElementById('api-base-url-input');
            let val = input.value.trim();
            if (val) {
                if (val.endsWith('/')) {
                    val = val.substring(0, val.length - 1);
                }
                localStorage.setItem('ems_api_base_url', val);
                alert(`Backend API URL updated to: ${val}`);
            } else {
                localStorage.removeItem('ems_api_base_url');
                alert('Reset backend URL to default (local deployment).');
            }
            document.getElementById('api-settings-panel').classList.remove('active');
        }

        function togglePasswordVisibility(id) {
            const input = document.getElementById(id);
            const btnIcon = input.nextElementSibling.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                btnIcon.classList.remove('fa-eye');
                btnIcon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                btnIcon.classList.remove('fa-eye-slash');
                btnIcon.classList.add('fa-eye');
            }
        }
    </script>
</body>
</html>
